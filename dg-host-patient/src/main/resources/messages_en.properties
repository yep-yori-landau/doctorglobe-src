page.useragreement.heading = Terms and Conditions of Use
page.useragreement.heading1 = Terms and Conditions of Use
page.useragreement.text1 = This is a website (the Website") provided by Surgerate, Inc. ("Surgerate"). Use of any website under the surgerate.com domain (collectively, the "Services") is governed by the terms and conditions of this Agreement. Although accessible by others, the Services (which include content) are intended for access and use only by U.S. customers. Please read these terms and conditions of use (the "Agreement") carefully before accessing or using the Services.Throughout this Agreement, Surgerate is referred to as "we" or "us."
page.useragreement.heading2 = General Terms and Conditions
page.useragreement.text2 = By accessing or using the Services, you agree to bound by this Agreement as posted and accessible through our Website at the time of your access or use and to use the Services in accordance with the terms and conditions of this Agreement, our Privacy Policy and any additional terms and conditions that are referenced herein or that otherwise may apply to specific features of the Services, or to products or services that we make available to you through the Services (all of which are deemed part of this Agreement). If you do not agree to the terms and conditions of use for the Services as set forth in this Agreement, you may not use the Services.
page.useragreement.text2_subtext = If we need to change the terms of this Agreement in the future, we will post the revised Terms and Conditions of Use through our Website and update the â\u20AC\u0153Last Revisedâ\u20AC\u009D date, below, to reflect the date of the changes. You agree to review these Terms and Conditions of Use each time you use the Services so that you are aware of any modifications made to this Agreement. By continuing to access or use the Services after we post such changes, you agree to the terms of this Agreement, as modified.
page.useragreement.heading3 = What Service does Surgerate Provide?
page.useragreement.text3 = Surgerate maintains and hosts website services that provide health provider and healthcare quality information for individuals age thirteen and older, as well as offers information and a means to enable you to schedule certain health care services via remote means by facilitating the connection between you and a health care provider through the use of the Website. Note that the capitalized word â\u20AC\u0153Servicesâ\u20AC\u009D as used in this Agreement refers only to our Website and related content and does not refer to any health care services/consultations and treatment that users receive from health care professionals. Website content should not be considered health advice or an endorsement, representation or warranty that any particular treatment is safe, appropriate, or effective for you.
page.useragreement.heading4 = How to Use the Website?
page.useragreement.text4 = To use the Website, you first need to sign up with Surgerate. When signing up, you may be obligated to provide us with certain information, such as your name, address and date of birth. In the future, we may also require users to provide insurance information. Upon successful completion of the sign up process, we will provide you with a personal account, accessible for you with a password of your choice.
page.useragreement.text5 = You have to be 13 years of age or older and reside in a jurisdiction in which we offer the Website to use the Website. If you reside in a jurisdiction that restricts the use of the Website because of age, or restricts the ability to enter into contracts such as this one due to age, you must abide by such age limits and you must not use the Website. You represent that you are of legal age to enter into a binding contract.
page.useragreement.text6 = The Website identifies for you, health care providers who have licensed the Website from us and that have engaged us to provide administrative, scheduling, and other operational services. You will be able to select a health care professional to provide certain services. In the event a health care professional agrees to provide you with services, the Website can schedule those services. The health care professional will bill you for the services provided. We make no representation or warranty to you that any health care professional will be available to perform health care services  
page.useragreement.text7 = BY CLICKING THE LINK TO A PARTICULAR PROVIDER, YOU ARE SIGNALING YOUR DESIRE TO CONNECT WITH ONE OF THEM, AND ONE OR MORE OF THEM MAY THEN CHOOSE TO CONNECT WITH YOU AS SOON AS PRACTICABLE. PLEASE NOTE THAT SURGERATE DOES NOT REFER OR RECOMMEND ANY THERAPIST. SURGERATE IS A PLATFORM THAT ALLOWS YOU TO TRANSMIT A REQUEST TO A PANEL OF PROVIDERS, AND FACILITATES THE ABILITY OF A PROVIDER TO RESPOND TO YOUR REQUEST AND CHOOSE TO CONNECT WITH YOU. 
page.useragreement.text8 = SURGERATE IS NOT ENGAGED IN THE PRACTICE OF MEDICINE OR ANY OTHER LICENSED PROFESSION, DOES NOT PROVIDE HEALTH SERVICES, AND IS NOT A HEALTH CARE PROVIDER. SURGERATE DOES NOT INTERFERE WITH ANY OTHER LICENSED PROFESSION BY ANY HEALTH CARE PROFESSIONAL, WHO ARE EACH RESPONSIBLE FOR HIS OR HER SERVICES AND COMPLIANCE WITH THE REQUIREMENTS APPLICABLE TO HIS OR HER PROFESSION AND LICENSE. THE HEALTH CARE PROFESSIONAL WITH WHICH YOU ESTABLISH A TREATMENT RELATIONSHIP IS SOLELY RESPONSIBLE FOR PROVIDING YOU WITH SERVICES. WE ONLY ACT AS A TECHNOLOGY PLATFORM TO CONNECT YOU WITH HEALTH CARE PROFESSIONALS WHO MAY BE INTERESTED IN PROVIDING YOU WITH HEALTH SERVICES. 
page.useragreement.heading5 = Your Use of the Services
page.useragreement.text9 = You represent and warrant that the information you provide to us is accurate and complete. You acknowledge and agree that we are entitled at all times to verify the information provided and to deny your use of the Services at any time for any reason or no reason.
page.useragreement.text10 = You may only access the Services using authorized means. It is your responsibility to check to ensure you download the correct Website for your device. We are not liable if you do not have a compatible device or if you download the wrong version of the Website for your device.



