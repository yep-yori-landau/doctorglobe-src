<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title th:remove="all" th:text="#{mail.title}"></title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <style type="text/css">
		body{margin:0; padding:0;}
	</style>
  </head>
  <body style="font-family:Arial, Helvetica, sans-serif;">
 <table style="width:714px; background:#fcfefd;" cellpadding="0" cellspacing="0">       
        <tr>
        	<td colspan="2" style="padding:40px 40px 10px 40px;">
            	<h1 style="margin:0; padding:0; color:#3c4648; font-size:18px;"><span th:text="#{mail.dear}"></span>  <span th:text="${name}"></span></h1>
                <p style="margin:0; padding:10px 0 0 0; font-size:13px; color:#717679; line-height:18px; text-align:justify;" th:if="${message} != null" th:utext="${message}">                	
                </p>
                <p th:if="${conference_dt} != null">
		         	<span th:text="#{mail.conference_dt}"></span> <span th:text="${conference_dt}"></span>
		    	</p>		    
            </td>            
        </tr>        
        <tr>
        	<td colspan="2" style="padding:10px 40px;">            
            	<p th:if="${url} != null" style="font-size:13px; color:#0b4eff;"> 
	       			<a th:href="${url}" th:text="#{mail.urltext}" style="font-size:13px; color:#0b4eff;"></a>
	    		</p>
	    	</td>    
        </tr>        
        
         <tr>
        	<td style="padding:0 40px;">
            <p style="font-size:14px; line-height:18px; color:#444; padding:10px 0 0 0;">
	        	<span th:text="#{mail.regards}"></span> <br />
	      		<em th:text="${sender}"></em>
	    	</p> 
            </td>
            
            <td style="padding:0 40px;" th:if="${url} != null">
            <a th:href="${url}" style="display:block; float:right; padding:10px 30px; background:#b6d44e; text-decoration:none; color:#fff; width:60px;" th:text="#{mail.signin}"></a>
            </td>
        </tr>        
       <tr>
        	<td style="padding:0 40px;"><img th:src="${imageResourceUrl}+'/resources/img/logo.png'" border="0" style="float:left;" width="181" height="44" /></td>            
        </tr>  
    </table>
  </body>
</html>
