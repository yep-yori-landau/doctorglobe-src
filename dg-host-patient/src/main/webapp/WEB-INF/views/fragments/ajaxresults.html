<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="ajaxresults">
	<script type="text/javascript" th:inline='javascript'>
				$(document).ready(function() {		
					$("#hsort").msDropDown().data("dd");
					var rangemaxvalue = parseInt($('.rangemaxvalue').text().replace("$", "").replace(",",""));		
					var rangeminvalue = parseInt($('.rangeminvalue').text().replace("$", "").replace(",",""));
					var distanceMax = parseInt($('.distancemaxvalue').text().replace(",",""));
					var flighthourMax = parseInt($('.flighthourmaxvalue').text().replace(" hr",""));
					
					$('body').on('click','.filters',function(){
						$('.viewmore').attr('data-value',1);	
						ajaxFilter(false);
					});
					
					$('.textsearchfilter').click(function(){
						$('.viewmore').attr('data-value',1);
						ajaxFilter(false);
					});
					
					function ajaxFilter(reset){
						
						var distanceFilter = parseInt($('.distancemax').text().replace(",",""));
						var flighthourFilter = parseInt($('.flighthourmax').text().replace(" hr",""));
						var regionFilter = [];
						var amenityFilter = [];
						var equipmentFilter = [];
						var volumeFilter = [];
						var priceFilter = parseInt($('.rangevalue').text().replace("$", "").replace(",",""));
						var limit = parseInt($('.viewmore').attr('data-value'));
						var textFilter = $('.textsearch').val();
						var sliderChange = false;
						if(isNaN(limit)){
							$('.viewmore').attr('data-value',1);
							limit = 1;
						}						
						var sortingFilter = $("select.sort-select").val();
						if(isNaN(priceFilter)){
							priceFilter = 0;
						}else{
							if(priceFilter != rangeminvalue){
								sliderChange = true;
							}
						}
						if(isNaN(distanceFilter)){
							distanceFilter = 0;
						}else{
							if(distanceFilter != distanceMax){
								sliderChange = true;
							}
						}
						if(isNaN(flighthourFilter)){
							flighthourFilter = 0;
						}else{
							if(flighthourFilter != flighthourMax){
								sliderChange = true;
							}
						}
						var found = false;
						$('.filters').each(function(){
							var id = $(this).attr('id');
							if($(this).is(':checked')){
								if($("#"+id).hasClass("region")){
								   regionFilter.push($(this).attr('name'));				   
								}
								else if($("#"+id).hasClass("amenity")){
									amenityFilter.push($(this).attr('name'));
								}else if($("#"+id).hasClass("volume")){
									volumeFilter.push($(this).attr('name'));
								}
								found = true;
							}
						});
						if(reset){
							sliderChange = true;	
						}
						//var hosturl = /*[[${application.hostbaseurl} ]]*/;
						//var hosturl = window.location.protocol + "//" + window.location.host;
						
						/*<![CDATA[*/
							var url = "refreshItem";
						/*]]>*/     
						$("#ajaxresult").load(url,{treatment:$('#treatmentid').text(),
												regionFilter:regionFilter,
												amenityFilter:amenityFilter,
												equipmentFilter:equipmentFilter,
												volumeFilter:volumeFilter,
												distanceFilter : distanceFilter,
												priceFilter : priceFilter,												
												sortingFilter : sortingFilter,
												textFilter : textFilter,
												filterSelected : found,
												sliderChange : sliderChange,										
												limit: limit,
												reset: reset,
												flighthourFilter : flighthourFilter
												});    	
						
					}
					
					var $slider1 = $('.slider-bonus-filter').slider({
						range: "min",
						step: parseInt(((parseInt($('.rangemaxvalue').text().replace("$", "").replace(",","")))-(parseInt($('.rangeminvalue').text().replace("$", "").replace(",",""))))/5),
						min: parseInt($('.rangeminvalue').text().replace("$", "").replace(",","")),
						max: parseInt($('.rangemaxvalue').text().replace("$", "").replace(",","")),
						value: parseInt($('.rangeminvalue').text().replace("$", "").replace(",","")),		
						change: function(event, ui){
							if (event.originalEvent) {
								$('.rangevalue').text('$'+ui.value.toLocaleString('us-US'));
								$('.viewmore').attr('data-value',1);
								ajaxFilter(false);
							}
						}
					});	
					$slider1.slider("float");
					
					var $slider2 = $('.slider-distance-miles').slider({
						range: "min",
						step: 1,
						min: parseInt($('.distanceminvalue').text().replace(",","")),
						max: parseInt($('.distancemaxvalue').text().replace(",","")),
						value: parseInt($('.distancemaxvalue').text().replace(",","")),
						change: function(event, ui){		
							 if (event.originalEvent) {
				    			$('.distancemax').text(ui.value.toLocaleString('us-US'));
				    			$('.viewmore').attr('data-value',1);
				    			ajaxFilter(false);
							 }
						}
					});	
					$slider2.slider("float");
					
					var $slider3 = $('.slider-flight-hour').slider({
						range: "min",
						step: 1,
						min: parseInt($('.flighthourminvalue').text().replace(" hr","")),
						max: parseInt(Math.ceil($('.flighthourmaxvalue').text().replace(" hr",""))),
						value: parseInt(Math.ceil($('.flighthourmaxvalue').text().replace(" hr",""))),
						change: function(event, ui){		
							 if (event.originalEvent) {
				    			$('.flighthourmax').text(ui.value+' hr');
				    			$('.viewmore').attr('data-value',1);
				    			ajaxFilter(false);
							 }
						}
					});	
					$slider3.slider("float");
					
					$(".clearfilter").click(function(){
						/*<![CDATA[*/	
						$('.filters').each(function(){
							this.checked = false;
							$(this).removeAttr('disabled');
							/*var id = $(this).attr('id');
							if($("#"+id).hasClass("volume") && (id == "high" || id == "moderatelyhigh" || id == "moderate")){
								this.checked = true;	
							}*/
						});
						
						$('.slider-bonus-filter').slider({
							value: parseInt($('.rangeminvalue').text().replace("$", "").replace(",","")),			
						});
						
						$('.slider-distance-miles').slider({
							value: parseInt($('.distancemaxvalue').text().replace(",", "").replace(",","")),
						});
						
						$('.slider-flight-hour').slider({
							value: parseInt($('.flighthourmaxvalue').text().replace(" hr","")),			
						});		
						//$('.rangemax').text(parseInt($('.rangeminvalue').text())+"K");
						$('.rangevalue').text($('.rangeminvalue').text().replace("$", "").replace(",",""));
						//$('.timemax').text(parseInt($('.timemaxvalue').text()));
						$('.distancemax').text(parseInt($('.distancemaxvalue').text().replace(",","")));
						$('.flighthourmax').text(parseInt($('.flighthourmaxvalue').text().replace(" hr","")));
						$("#textsearch").val('');
						$('select.sort-select').val('rankings');
						$('.viewmore').attr('data-value',1);
						ajaxFilter(true);
						/*]]>*/ 
					});			
					
					$("body").on('change','select.sort-select',function(e){
						e.stopImmediatePropagation();
						$('.viewmore').attr('data-value',1);
						ajaxFilter(false);				
					});
					
					$('body').on('click','.viewmore',function(e){				
						e.stopImmediatePropagation();
						var num = parseInt($(this).attr('data-value')) + 1;						
						$(this).attr('data-value',num);				
						ajaxFilter(false);				
					});
					// <![CDATA[
					/*$("#textsearch").keyup(function(){
						$('.res').show();
						var valThis = $(this).val().toLowerCase();		
						$('.viewmore').hide();					
						$('.res').each(function(){
							var text = $(this).find("ul").find("li").find("h3").text().toLowerCase();
							if(text.indexOf(valThis) == -1){
								$(this).hide();
							}
										
						});
					});*/
					
					
					$(document).ajaxStart(function(){
					    $(".loader").css("display", "block");
					});

					$(document).ajaxComplete(function(){
					    $(".loader").css("display", "none");
					});			
					
					$(".various").fancybox({			    
						fitToView	: false,		
						padding     : 0,
						margin      : 0,
						autoSize	: false,		
						closeClick	: false,
						closeBtn	: 	true,
						scrolling : 'no', 
						openEffect	: 'elastic',
						closeEffect	: 'elastic',
						fitToView: true,
						beforeLoad  : function(){					
							this.width = 800;
							this.height = 600;		
						}			
					});		
					
					$('select.js-select').msDropDown();
					
					$('body').on('click','li article .ico-close',function(){			
						var id = $(this).parent().attr('id');
						var selClass =$(this).parent().attr('class');			
						$(this).parent().hide('slow');
						$(this).parent().parent('li').slideUp("slow", function() { $(this).remove();});				
					});	
					// ]]>
				});
		   </script>		   			
</div>
</body>
</html>
