<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" th:include="layouts/layout::page">
<body>
	<main id="main-content" th:fragment='content'>	
	  <div class="wrap">
			<aside th:replace="fragments/sidebar :: sidebar"></aside>
			<div id="container">
				<div class="my-block">
				<form th:action="@{/home/speciality-treatment-method-practitioner-detail}" th:object="${hospitalSpecialityTreatmentMethodPractitionerDetailForm}" method="post">
					<h3 class="hel-med fs-16 title-in">
						<span th:text="#{page.hospital.treatment.speciality_of}">Speciality of</span>						
						<span th:text="${specialityMap.get(hospitalSpecialityTreatmentMethodPractitionerDetailForm.speciality)}">Aesthetics</span>
						<span>&gt;</span>
						<span th:text="${treatmentMap.get(hospitalSpecialityTreatmentMethodPractitionerDetailForm.treatment)}">Aesthetics</span>
						<span th:text="#{page.hospital.method.treatment}"></span>
						<span>&gt;</span>
						<span th:text="${methodMap.get(hospitalSpecialityTreatmentMethodPractitionerDetailForm.method)}">Aesthetics</span>
						<span>&gt;</span>
						<span th:text="${practitionerMap.get(hospitalSpecialityTreatmentMethodPractitionerDetailForm.hstmpModel.practitioner)}">Aesthetics</span>	                    
					</h3>
					<h3 class="hel-med fs-16" >
						<span th:text="${practitionerMap.get(hospitalSpecialityTreatmentMethodPractitionerDetailForm.hstmpModel.practitioner)}">Dr Richie Hawtin:</span>
						<span th:if="${success != null}" th:text="#{page.hospital.success.edited}" class="fr text-danger"></span>						
					</h3>
                            <ul class="my-form mt-20">
                            	<input type="hidden" th:field="*{hstmpModel.id}" class="half" required="required"/>
                            	<input type="hidden" th:field="*{hstmpModel.active}" class="half" required="required"/>
                            	<input type="hidden" th:field="*{hstmpModel.practitioner}" class="half" required="required"/>
                            	<input type="hidden" th:field="*{hstmpModel.healthcareproviderSpecialityTreatmentMethod}" class="half" required="required"/>
                            	<input type="hidden" th:field="*{treatment}" class="half" required="required"/>
                            	<input type="hidden" th:field="*{method}" class="half" required="required"/>
                            	<input type="hidden" th:field="*{speciality}" class="half" required="required"/>
                            	<li>
                                    <label for="availabilityDays" th:text="#{page.hospital.speciality.treatment.method.practitioner.availability}">Availability:</label>
                                    <input type="text" th:field="*{hstmpModel.availabilityDays}" class="half" required="required"/>
                                </li>
                            	<li>
                                    <label for="yearsPracticed" th:text="#{page.hospital.speciality.treatment.method.practitioner.years_practised}">Years Practised:</label>
                                    <input type="text" th:field="*{hstmpModel.yearsPracticed}" class="half" required="required"/>
                                </li>
                                <li>
                                    <label for="numberPerformedOverall" th:text="#{page.hospital.speciality.treatment.method.practitioner.performed}">Preformed(lifetime):</label>
                                    <input type="text" th:field="*{hstmpModel.numberPerformedOverall}" class="half" required="required" />
                                </li>
                                <li>
                                    <label for="numberPerformedLastYear" th:text="#{page.hospital.speciality.treatment.method.practitioner.returns}">Performed (Last 12 months):</label>
                                    <input type="text" th:field="*{hstmpModel.numberPerformedLastYear}" class="half" required="required"/>
                                </li>
                                <li>
                                    <label for="correctionsLastYear" th:text="#{page.hospital.speciality.treatment.method.practitioner.corrections}">Performed (Last 12 months):</label>
                                    <input type="text" th:field="*{hstmpModel.correctionsLastYear}" class="half" required="required"/>
                                </li>                                
                                <li>
                                    <label for="practitionerPrice" th:text="#{page.hospital.speciality.treatment.method.practitioner.price}">Price:</label>
                                    <input type="text" th:field="*{hstmpModel.practitionerPrice}" class="half" required="required"/>                                    
                                </li>      
                                <li>
                                    <label for="healthcareproviderPrice" th:text="#{page.hospital.speciality.treatment.method.practitioner.hospital_price}">Hospital Price:</label>
                                    <input type="text" th:field="*{hstmpModel.healthcareproviderPrice}" class="half" required="required"/>                                   
                                </li>
                                <li>
                                    <label for="methodPrice" th:text="#{page.hospital.speciality.treatment.method.practitioner.method_price}">Method Price:</label>
                                    <input type="text" th:field="*{hstmpModel.methodPrice}" class="half" required="required"/>                                   
                                </li>
                                <li>
                                    <label for="currency" th:text="#{page.hospital.speciality.treatment.method.practitioner.currency}">Currency:</label>                                    
                                    <select class="my-select w-16" th:field="*{hstmpModel.currency}" id="currency">
                                        <option th:each="currency : ${currencyList}" th:text="${currency}" th:value="${currency}"></option>
                                    </select>
                                </li>
                                
                            </ul>                           
                            <div class="tc my-btn-block">
                                <button class="btn btn-sm btn-dk-blue" type="reset" th:text="#{page.hospital.btn_cancel}">Cancel</button>
                                <button class="btn btn-sm btn-blue btn-list-submit" type="submit" th:text="#{page.hospital.btn_save_changes}">Save Changes</button>
                            </div>
                        </form>
				</div>	
			</div>
	</div>
	</main>
</body>
</html>
