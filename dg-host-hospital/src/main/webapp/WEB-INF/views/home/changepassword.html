<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" th:include="layouts/layout::page">
<body>
	<main id="main-content" th:fragment='content'>
		<div class="wrap">
			<aside th:replace="fragments/usersidebar :: sidebar"></aside>
			<div id="container">
                    <div class="my-block">                    
                        <h3 class="hel-med fs-16 title-in">
                           <span th:text="#{page.hospital.user.change_password}"></span>
                           <span th:if="${success != null}" th:text="#{page.hospital.success.edited}" class="fr text-danger"></span>
                           <span th:if="${error != null}" th:text="#{page.hospital.failed.change_password}" class="fr text-danger"></span>
                        </h3>
                        <form th:action="@{/home/changepassword}" th:object="${changePasswordForm}" id="changePasswordForm" method="post" class="w-75">
                        	<ul class="my-form mt-20">
                        		<li>	
                                	<input type="hidden" th:field="*{id}" th:value="*{id}" />                              	
                                    <label for="oldPassword" th:text="#{page.hospital.user.old_password}">Old Password</label>
                                    <input type="password" th:field="*{oldPassword}"/>
                                    <span th:if="${#fields.hasErrors('oldPassword')}" th:errors="*{oldPassword}" class="ml-145 text-danger"></span> 
                                </li>                            	
                                <li>                                                                 
                                    <label for="newPassword" th:text="#{page.hospital.user.new_password}">New Password</label>
                                    <input type="password" th:field="*{newPassword}"/>
                                    <span th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}" class="ml-145 text-danger"></span> 
                                </li>
                                <li>                                	                                 
                                    <label for="confirmPassword" th:text="#{page.hospital.user.confirm_password}">Confirm Password</label>
                                    <input type="password" th:field="*{confirmPassword}"/> 
                                    <span th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}" class="ml-145 text-danger"></span>
                                </li>                                                                
                           </ul>     
                           <div class="tr my-btn-block">
                                <button class="btn btn-sm btn-dk-blue" type="reset" th:text="#{page.hospital.btn_cancel}">Cancel</button>
                                <button class="btn btn-sm btn-blue" type="submit" th:text="#{page.hospital.btn_save_changes}">Save Changes</button>
                            </div>
                        </form>
                      </div>
                      <script type="text/javascript" th:inline='javascript'>
			 $(document).ready(function() {
				 $.validator.addMethod("passwordChecker",function(value){
					 var re = /^(?=.*\d)(?=.*[a-z])(?=.*[A-Z])\w{6,}$/;
					 return re.test(value);  
				 });
				 $( "#changePasswordForm" ).validate({
					 	rules: {
					 		oldPassword: {
					 			required: true,
					 			minlength: 6,
					 			passwordChecker : true
					 		},
					 		newPassword: {
					 			required: true,
					 			minlength: 6,
					 			passwordChecker : true
					 		},
					 		confirmPassword: {
					 			required: true,
					 			minlength: 6,
					 			passwordChecker : true,
					 			equalTo: "#newPassword"
					 		}
					 	},
					 	messages: {
					 		oldPassword: {
					            required: "Please provide a old password",
					            minlength: "Your password must be at least 6 characters long",
					            passwordChecker: "Your password must contain atleast one number, one lowercase and one uppercase letter or the underscore"
					        },
					 		newPassword: {
					            required: "Please provide a password",
					            minlength: "Your password must be at least 6 characters long",
					            passwordChecker: "Your password must contain atleast one number, one lowercase and one uppercase letter or the underscore"
					        },
					        confirmPassword: {
					            required: "Please provide a password",
					            minlength: "Your password must be at least 6 characters long",
					            passwordChecker: "Your password must contain atleast one number, one lowercase and one uppercase letter or the underscore",
					            equalTo: "Please enter the same password as above"
					        },
					    },
					    submitHandler: function(form){
							form.submit();
						}
				});							
			 });
		 </script>
             </div>           
		</div>
	</main>
</body>
</html>
