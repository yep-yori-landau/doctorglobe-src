<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" th:include="layout::page" class='sidebar-large'>
<div class="container" th:fragment="content">					
<div class="page-title"> <i class="icon-custom-left"></i>               
            </div>
            <div class="row">
                <div class="col-md-12">
                    <div class="panel panel-default">
                        <div class="panel-heading bg-red">
							<h3 class ="panel-title"><strong>Newsletter</strong></h3>
						</div>
                        <div class="panel-body">
                            <div class="row">
                                <div class="col-md-12 col-sm-12 col-xs-12">
                                <form action="#" th:action="@{/newsletter/save}" th:object="${newsletter}" method="post" id="form1" class="form-horizontal">
                                		<input type="hidden" class="form-control" th:field="*{id}" th:value="*{id}"/>                                 
                                        <div class='form-group'>
                                            <label class='col-sm-3 control-label'>Name<span class='asterisk'>*</span>
                                            </label>
                                            <div class='col-sm-9'>
                                              <input type='text' class='form-control' th:field="*{name}" th:value="*{name}"/>                                                
                                            </div>
                                        </div>
<div class='form-group'>
                                            <label class='col-sm-3 control-label'>Email<span class='asterisk'>*</span>
                                            </label>
                                            <div class='col-sm-9'>
                                              <input type='text' class='form-control' th:field="*{email}" th:value="*{email}"/>                                                
                                            </div>
                                        </div>
<div class='form-group'>
                                            <label class='col-sm-3 control-label'>Subscribed<span class='asterisk'>*</span>
                                            </label>
                                            <div class='col-sm-9'>
                                              <input type='text' class='form-control' th:field="*{subscribed}" th:value="*{subscribed}"/>                                                
                                            </div>
                                        </div>

                                                                          
                                        <div class="col-sm-9 col-sm-offset-3">
                                            <div class="pull-right">
                                                <button class="btn btn-primary m-b-10">Submit</button>                                                
                                            </div>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>			
</div>
</div>
</html>
