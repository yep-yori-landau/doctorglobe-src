<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" th:include="layout::page" class='sidebar-large'>
<div class="container" th:fragment="content">					
<div class="page-title"> <i class="icon-custom-left"></i>               
            </div>
            <div class="row">
                <div class="col-md-12">
                    <div class="panel panel-default">
                        <div class="panel-heading bg-red">
							<h3 class ="panel-title"><strong>Country Daily Expense</strong></h3>
						</div>
                        <div class="panel-body">
                            <div class="row">
                                <div class="col-md-12 col-sm-12 col-xs-12">
                                <form action="#" th:action="@{/daily-expense/save}" th:object="${dailyExpense}" method="post" id="dailyexpense" class="form-horizontal">
                                		<input type="hidden" class="form-control" th:field="*{id}" th:value="*{id}"/>                                 
                                       
                                        <div class='form-group'>
                                            <label class='col-sm-3 control-label'>City<span class='asterisk'>*</span>
                                            </label>
                                            <div class='col-sm-9'>
                                              <select th:field="*{country}" class="form-control">
                                                <option th:each = "var : ${countryList}" th:value="${var.id}" th:text="${var.name}"></option>
                                              </select>                                                 
                                            </div>
                                        </div>   
                                       
                                        <div class='form-group'>
                                            <label class='col-sm-3 control-label'>Amount<span class='asterisk'>*</span>
                                            </label>
                                            <div class='col-sm-9'>
                                              <input th:field="*{amount}" class="form-control"/>                                                
                                            </div>
                                        </div>    
                                        <div class='form-group'>
											<label class='col-sm-3 control-label'>currency<span class='asterisk'>*</span>
											</label>
											<div class='col-sm-9'>												
												<select th:field="*{currency}" class="form-control">
                                                	<option th:each = "currency : ${currencyList}" th:value="${currency}" th:text="${currency}"></option>
                                                </select>                                          
											</div>
									    </div>                                                                                  
                                        <div class="col-sm-9 col-sm-offset-3">
                                            <div class="pull-right">
                                                <button class="btn btn-primary m-b-10" onclick="javascript:$('#citydailyexpense').parsley('validate');">Submit</button>                                                
                                            </div>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>			
</div>
</div>
</html>
