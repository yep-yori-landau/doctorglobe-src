<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" th:include="layout::page" class='sidebar-large'>
<div class="container" th:fragment="content">					
			<div class="row">
				<div class="col-md-12">
					<div class="panel panel-default">
					<div class="panel-heading" th:if="${message} != null">
						<h3 class ="panel-title"><strong th:text="${message}"></strong></h3>
					</div>
					<div class="panel-heading bg-red">
						<h3 class ="panel-title"><strong>Corporate Company Insurance</strong></h3>
					</div>
					<div class="panel-body">
                            <div class="row">
                                <div class="col-md-12 m-b-20">
                                    <div class="btn-group">
                                       <a id="table-edit_new" class="btn btn-danger" th:href="@{'/corporatecompany-insurance/edit'}">
                                            Add New <i class="fa fa-plus"></i>
                                        </a>
                                    </div>
                                </div>
                      <div class="col-md-12 col-sm-12 col-xs-12 table-responsive table-red">
                            <table class="table table-striped table-hover dataTable" id="table-editable">          
								<thead>
									<tr>
										<th>id</th>
										<th>Program name</th>
										<th>Annual Oop</th>
										<th>Deductible</th>							
										<th>Co Insurance</th>										
										<th>Corporate Company</th>
										<th>Type</th>
										<th>Hsa Compatible</th>
										<th class="text-center sorting">Options</th>
									</tr>
								</thead>
						<tbody>							
								<tr th:each="model :${models}">
								<td th:text="${model.id}"></td>
								<td th:text="${model.programName}"></td>
								<td th:text="${model.annualOop}"></td>
								<td th:text="${model.deductible}"></td>
								<td th:text="${model.coInsurance}"></td>								
								<td th:text="${model.corporateCompany}"></td>
								<td th:text="${model.type}"></td>
								<td th:text="${model.hsaCompatible}"></td>
								
								<td class="text-center">
								<a class="edit btn btn-dark" th:href="@{'/corporatecompany-insurance/edit'(id=${model.id})}"><i class="fa fa-pencil-square-o"></i>
								Edit
								</a>								
								<a class="delete btn btn-danger" th:href="@{'/corporatecompany-insurance/delete'(id=${model.id})}">
								<i class="fa fa-times-circle"></i>
								Remove								
								</a>
								</td>
								</tr>							
						</tbody>
						</table>
					</div>
				</div>
			</div>
		</div>
		</div>
		</div>
</div>
</html>
