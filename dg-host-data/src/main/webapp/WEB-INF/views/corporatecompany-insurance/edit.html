<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" th:include="layout::page" class='sidebar-large'>
<div class="container" th:fragment="content">					
<div class="page-title"> <i class="icon-custom-left"></i>               
            </div>
            <div class="row">
                <div class="col-md-12">
                    <div class="panel panel-default">
                        <div class="panel-heading bg-red">
							<h3 class ="panel-title"><strong>Corporate Company Insurance</strong></h3>
						</div>
                        <div class="panel-body">
                            <div class="row">
                                <div class="col-md-12 col-sm-12 col-xs-12">
                                <form action="#" th:action="@{/corporatecompany-insurance/save}" th:object="${corporatecompanyInsurance}" method="post" id="corporatecompanyinsurance" class="form-horizontal">
                                		<input type="hidden" class="form-control" th:field="*{id}" th:value="*{id}"/>
                                		<div class='form-group'>
											<label class='col-sm-3 control-label'>Program Name<span class='asterisk'>*</span>
											</label>
											<div class='col-sm-9'>
												<input type="text" required='' class='form-control'
													th:field="*{programName}" th:value="*{programName}" />
											</div>
									    </div>    
									    <div class='form-group'>
											<label class='col-sm-3 control-label'>Annual OOP<span class='asterisk'>*</span>
											</label>
											<div class='col-sm-9'>
												<input type="text" required='' class='form-control'
													th:field="*{annualOop}" th:value="*{annualOop}" />
											</div>
									    </div>                                 
                                        <div class='form-group'>
											<label class='col-sm-3 control-label'>Deductible<span class='asterisk'>*</span>
											</label>
											<div class='col-sm-9'>
												<input type="text" required='' class='form-control'
													th:field="*{deductible}" th:value="*{deductible}" />
											</div>
									    </div>    
									    <div class='form-group'>
											<label class='col-sm-3 control-label'>Co insurance<span class='asterisk'>*</span>
											</label>
											<div class='col-sm-9'>
												<input type="text" required='' class='form-control'
													th:field="*{coInsurance}" th:value="*{coInsurance}" />
											</div>
									    </div>									    
										<div class='form-group'>
                                            <label class='col-sm-3 control-label'>Corporate Company<span class='asterisk'>*</span>
                                            </label>
                                            <div class='col-sm-9'>
                                              <select th:field="*{corporateCompany}" class="form-control">
                                                <option th:each = "var : ${corporatecompanyList}" th:value="${var.id}" th:text="${var.name}"></option>
                                              </select>                                                 
                                            </div>
                                        </div>        
                                        <div class='form-group'>
											<label class='col-sm-3 control-label'>Type</label>
											<div class='col-sm-9'>
												<input type="text" class='form-control'
													th:field="*{type}" th:value="*{type}" />
											</div>
									    </div>	
                                        <div class='form-group'>
                                            <label class='col-sm-3 control-label'>Hsa Compatible<span class='asterisk'>*</span>
                                            </label>
                                            <div class='col-sm-9'>                                              
                                              <select th:field="*{hsaCompatible}" class="form-control">
                                              	<option th:value="1" th:text="Yes"></option>
                                              	<option th:value="0" th:text="No"></option>                                              	                                            
                                              </select>                                                
                                            </div>
                                        </div>                                                                  
                                        <div class="col-sm-9 col-sm-offset-3">
                                            <div class="pull-right">
                                                <button class="btn btn-primary m-b-10" onclick="javascript:$('#corporatecompanyinsurance').parsley('validate');">Submit</button>                                                
                                            </div>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>			
</div>
</div>
</html>
