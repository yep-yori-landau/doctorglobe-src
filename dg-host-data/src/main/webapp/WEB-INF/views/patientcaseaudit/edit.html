<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:th="http://www.thymeleaf.org" th:include="layout::page"
	class='sidebar-large'>
<div class="container" th:fragment="content">
	<div class="page-title">
		<i class="icon-custom-left"></i>
	</div>
	<div class="row">
		<div class="col-md-12">
			<div class="panel panel-default">
				<div class="panel-heading bg-red">
					<h3 class="panel-title">
						<strong th:text="#{page.heading.patientcaseaudit}">Patientcaseaudit</strong>
					</h3>
				</div>
				<div class="panel-body">
					<div class="row">
						<div class="col-md-12 col-sm-12 col-xs-12">
							<form action="#" th:action="@{/patientcaseaudit/save}"
								th:object="${patientcaseaudit}" method="post"
								id="patientcaseaudit" class="form-horizontal">
								<div class="form-group">
									<ul>
										<li th:each="e : ${#fields.detailedErrors()}"
											th:class="${e.global}? globalerr : fielderr"><span
											class='text-danger' th:text="${e.global}?'*':${e.fieldName}">The
												field name </span> | <span class='text-danger'
											th:text="${e.message}">The error message</span></li>
									</ul>
									<div th:errors="${patientcaseaudit}"></div>
								</div>
								<input type="hidden" class="form-control" th:field="*{id}"
									th:value="*{id}" />
								<div class='form-group'>
									<label class='col-sm-3 control-label'>Change_type<span
										class='asterisk'>*</span>
									</label>
									 <div class='col-sm-9'>                                              
                                              <select th:field="*{changeType}" class="form-control">
                                              	<option th:value="Adding+' '+Doctor" th:text="Adding+' '+Doctor"></option>
                                              	<option th:value="Messaging+' '+Doctor" th:text="Messaging+' '+Doctor"></option>                                              	                                            
                                              	<option th:value="Uploading+' '+Files" th:text="Uploading+' '+Files"></option>
                                              	<option th:value="Others" th:text="Others"></option>
                                              </select>                                                
                                     </div>
								</div>
								<div class='form-group'>
									<label class='col-sm-3 control-label'>Change_dt<span
										class='asterisk'>*</span>
									</label>
									<div class='col-sm-9'>
										<input type="text" required='' class='form-control date-picker'
											th:field="*{changeDt}" th:value="*{changeDt}" />
									</div>
								</div>
								<div class='form-group'>
									<label class='col-sm-3 control-label'>Status_from<span
										class='asterisk'>*</span>
									</label>
									<div class='col-sm-9'>
										<input type="text" required='' class='form-control'
											th:field="*{statusFrom}" th:value="*{statusFrom}" />
									</div>
								</div>
								<div class='form-group'>
									<label class='col-sm-3 control-label'>Status_to<span
										class='asterisk'>*</span>
									</label>
									<div class='col-sm-9'>
										<input type="text" required='' class='form-control'
											th:field="*{statusTo}" th:value="*{statusTo}" />
									</div>
								</div>
								<div class='form-group'>
									<label class='col-sm-3 control-label'>Description<span
										class='asterisk'>*</span>
									</label>
									<div class='col-sm-9'>
										<input type="text" required='' class='form-control'
											th:field="*{description}" th:value="*{description}" />
									</div>
								</div>
								<div class='form-group'>
									<label class='col-sm-3 control-label'>Patient_case<span
										class='asterisk'>*</span>
									</label>
									<div class='col-sm-9'>
										<select th:field="*{patientCase}" class="form-control">
											<option th:each="var : ${patientcaseList}"
												th:value="${var.id}" th:text="${var.description}"></option>
										</select>
									</div>
								</div>


								<div class="col-sm-9 col-sm-offset-3">
									<div class="pull-right">
										<button class="btn btn-primary m-b-10"
											onclick="javascript:$('#patientcaseaudit').parsley('validate');"
											th:text="#{page.button.submit}">Submit</button>
									</div>
								</div>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
</div>
</html>
