<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:th="http://www.thymeleaf.org" th:include="layout::page"
	class='sidebar-large'>
<div class="container" th:fragment="content">
	<div class="page-title">
		<i class="icon-custom-left"></i>
	</div>
	<div class="row">
		<div class="col-md-12">
			<div class="panel panel-default">
				<div class="panel-heading bg-red">
					<h3 class="panel-title">
						<strong th:text="#{page.heading.associate}">Associate</strong>
					</h3>
				</div>
				<div class="panel-body">
					<div class="row">
						<div class="col-md-12 col-sm-12 col-xs-12">
							<form action="#" th:action="@{/associate/save}"
								th:object="${associate}" method="post" id="associateform"
								class="form-horizontal" enctype="multipart/form-data">
								<div class="form-group">
									<ul>
										<li th:each="e : ${#fields.detailedErrors()}"
											th:class="${e.global}? globalerr : fielderr"><span
											class='text-danger' th:text="${e.global}?'*':${e.fieldName}">The
												field name </span> | <span class='text-danger'
											th:text="${e.message}">The error message</span></li>
									</ul>
									<div th:errors="${associate}"></div>
								</div>
								<input type="hidden" class="form-control" th:field="*{id}"
									th:value="*{id}" />
								<div class='form-group'>
									<label class='col-sm-3 control-label'>Title</label>
									<div class='col-sm-9'>
										<input type="text" class='form-control' th:field="*{title}"
											th:value="*{title}" />
									</div>
								</div>
								<div class='form-group'>
									<label class='col-sm-3 control-label'>First_name<span
										class='asterisk'>*</span>
									</label>
									<div class='col-sm-9'>
										<input type="text" required='' class='form-control'
											th:field="*{firstName}" th:value="*{firstName}" />
									</div>
								</div>
								<div class='form-group'>
									<label class='col-sm-3 control-label'>Last_name<span
										class='asterisk'>*</span>
									</label>
									<div class='col-sm-9'>
										<input type="text" required='' class='form-control'
											th:field="*{lastName}" th:value="*{lastName}" />
									</div>
								</div>													
								<div class='form-group'>
									<label class='col-sm-3 control-label'>Email<span
										class='asterisk'>*</span>
									</label>
									<div class='col-sm-9'>
										<input type="text" required='' class='form-control'
											th:field="*{email}" th:value="*{email}" />
									</div>
								</div>								
								<div class='form-group'>
									<label class='col-sm-3 control-label'>Password<span
										class='asterisk'>*</span>
									</label>
									<div class='col-sm-9'>
										<input type="password" required='' class='form-control'
											th:field="*{password}" th:value="*{password}" />
									</div>
								</div>								
								<div class='form-group'>
									<label class='col-sm-3 control-label'>Active<span
										class='asterisk'>*</span>
									</label>
									<div class='col-sm-9'>
										<select th:field="*{active}" class="form-control">
											<option th:value="1" th:text="Yes"></option>
											<option th:value="0" th:text="No"></option>
										</select>
									</div>
								</div>						
								<div class='form-group'>
									<label class='col-sm-3 control-label'>Association<span
										class='asterisk'>*</span>
									</label>
									<div class='col-sm-9'>
										<select th:field="*{association}" class="form-control">
											<option th:each="var : ${associationList}" th:value="${var.id}"
												th:text="${var.name}"></option>
										</select>
									</div>
								</div>
								
								<div class='form-group'>
									<label class='col-sm-3 control-label'>Phone<span
										class='asterisk'>*</span>
									</label>
									<div class='col-sm-9'>
										<input type="text" class='form-control'
											th:field="*{phone_1}" th:value="*{phone_1}" />
									</div>
								</div>
								
								<div class='form-group'>
									<label class='col-sm-3 control-label'>Mobile<span
										class='asterisk'>*</span>
									</label>
									<div class='col-sm-9'>
										<input type="text" class='form-control'
											th:field="*{mobilephone_1}" th:value="*{mobilephone_1}" />
									</div>
								</div>
								
								<div class="col-sm-9 col-sm-offset-3">
									<div class="pull-right">
										<button class="btn btn-primary m-b-10"
											onclick="javascript:$('#associate').parsley('validate');"
											th:text="#{page.button.submit}">Submit</button>
									</div>
								</div>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>
		<script type="text/javascript" th:inline='javascript'>
			 $(document).ready(function() {
				 $.validator.addMethod("passwordChecker",function(value){
					 var re = /^(?=.*\d)(?=.*[a-z])(?=.*[A-Z])\w{6,}$/;
					 return re.test(value);  
				 });
				 $( "#associateform" ).validate({
					 	rules: {
					 		title:{
					 			required: true,
					 		},
					 		firstName:{
					 			required: true,
					 		},
					 		lastName:{
					 			required: true,
					 		},					 							 		
					 		email:{
					 			required: true,
					 			email: true,
					 		},
					 		password: {
					 			required: true,
					 			minlength: 6,
					 			passwordChecker : true
					 		},		
					 		active:{
					 			required: true,				 			
					 		},
					 		association:{
					 			required: true,					 			
					 		},					 		
					 	},
					 	messages: {
					 		title: {
					 			required: "Please enter title"
					 		},
					 		firstName: {
					 			required: "Please enter first name"
					 		},
					 		lastName: {
					 			required: "Please enter last name"
					 		},
					 		email: {
					 			required: "Please enter email address",
					 			email: "Please enter valid email address"
					 		},					 		
					 		password: {
					            required: "Please provide a password",
					            minlength: "Your password must be at least 6 characters long",
					            passwordChecker: "Your password must contain atleast one number, one lowercase and one uppercase letter or the underscore"
					        },		
					        active: {
					 			required: "Please select value",					 			
					 		},
					 		association: {
					 			required: "Please select association",					 			
					 		},
					    },
					    submitHandler: function(form){
							form.submit();
						}
				});							
			 });
		 </script>
	</div>
</div>
</html>
