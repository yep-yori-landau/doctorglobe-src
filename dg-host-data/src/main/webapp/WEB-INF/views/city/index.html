<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:th="http://www.thymeleaf.org" th:include="layout::page"
	class='sidebar-large'>
<div class="container" th:fragment="content">
	<div class="row">
		<div class="col-md-12">
			<div class="panel panel-default">
				<div class="panel-heading" th:if="${message} != null">
					<h3 class="panel-title">
						<strong th:text="${message}"></strong>
					</h3>
				</div>
				<div class="panel-heading bg-red">
					<h3 class="panel-title">
						<strong th:text="#{page.heading.city}">City</strong>
					</h3>
				</div>
				<div class="panel-body">
					<div class="row">
						<div class="col-md-12 m-b-20">
							<div class="btn-group">
								<a id="table-edit_new" class="btn btn-danger"
									th:href="@{'/city/edit'}"> Add New <i class="fa fa-plus"></i>
								</a>
							</div>
						</div>
						<div
							class="col-md-12 col-sm-12 col-xs-12 table-responsive table-red">
							<table class="table table-striped table-hover dataTable"
								id="table-editable">
								<thead>
									<tr>
										<th th:text="#{city.id}">id</th>
										<th th:text="#{city.name}">name</th>
										<th th:text="#{city.state}">state</th>
										<th th:text="#{city.country}">country</th>
										<th th:text="#{city.lat}">Latitude</th>
										<th th:text="#{city.lon}">Longitude</th>
										<th class="text-center sorting" th:text="#{page.text.options}">Options</th>
									</tr>
								</thead>
								<tbody>
									<tr th:each="model :${models}">
										<td th:text="${model.id}"></td>
										<td th:text="${model.name}"></td>
										<td th:text="${model.state}"></td>
										<td th:text="${model.country}"></td>
										<td th:text="${model.lat}"></td>
										<td th:text="${model.lon}"></td>
										<td class="text-center"><a class="edit btn btn-dark"
											th:href="@{'/city/edit'(id=${model.id})}"><i
												class="fa fa-pencil-square-o"></i> Edit </a> <a
											class="delete btn btn-danger"
											th:href="@{'/city/delete'(id=${model.id})}"> <i
												class="fa fa-times-circle"></i> Remove
										</a></td>
									</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
</div>
</html>
