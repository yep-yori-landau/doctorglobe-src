<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" th:include="layout::page" class='sidebar-large'>
<div class="container" th:fragment="content">					
			<div class="row">
				<div class="col-md-12">
					<div class="panel panel-default">
                                        <div class="panel-heading" th:if="${message} != null">
						<h3 class ="panel-title"><strong th:text="${message}"></strong></h3>
					</div>
					<div class="panel-heading bg-red">
						<h3 class ="panel-title"><strong th:text="#{page.heading.patient}">Patient</strong></h3>
					</div>
					<div class="panel-body">
                            <div class="row">
                                <div class="col-md-12 m-b-20">
                                    <div class="btn-group">
                                       <a id="table-edit_new" class="btn btn-danger" th:href="@{'/patient/edit'}">
                                            Add New <i class="fa fa-plus"></i>
                                        </a>
                                    </div>
                                </div>
                      <div class="col-md-12 col-sm-12 col-xs-12 table-responsive table-red">
                            <table class="table table-striped table-hover dataTable" id="table-editable">          
								<thead>
									<tr>
										<th th:text="#{patient.id}">id</th>
							<th th:text="#{patient.title}">title</th>
							<th th:text="#{patient.first_name}">first_name</th>
							<th th:text="#{patient.last_name}">last_name</th>
							<th th:text="#{patient.dob}">dob</th>
							<th th:text="#{patient.gender}">gender</th>
							<th th:text="#{patient.mobile}">mobile</th>
							<th th:text="#{patient.email}">email</th>
							<th th:text="#{patient.phone}">phone</th>
							<!--<th th:text="#{patient.password}">password</th>-->
							<th th:text="#{patient.address}">address</th>
							<th th:text="#{patient.zip_code}">zip_code</th>
							<th th:text="#{patient.city}">city</th>
							<!--<th th:text="#{patient.photo}">photo</th>-->						
							<th th:text="#{patient.active}">active</th>
							<th th:text="#{patient.lat}">lat</th>
							<th th:text="#{patient.lon}">lon</th>
							<th th:text="#{patient.user_agreement}">User Agreement</th>
							<th th:text="#{patient.dependent}">Dependent</th>
							<th th:text="#{patient.ytd_oop}">Ytd Oop</th>
							
										<th class="text-center sorting" th:text="#{page.text.options}">Options</th>
									</tr>
								</thead>
						<tbody>							
								<tr th:each="model :${models}">
								<td th:text="${model.id}"></td>
								<td th:text="${model.title}"></td>
								<td th:text="${model.firstName}"></td>
								<td th:text="${model.lastName}"></td>
								<td th:text="${model.dob}"></td>
								<td th:text="${model.gender}"></td>
								<td th:text="${model.mobile}"></td>
								<td th:text="${model.email}"></td>
								<td th:text="${model.phone}"></td>
								<!--<td th:text="${model.password}"></td>-->
								<td th:text="${model.address}"></td>
								<td th:text="${model.zipCode}"></td>
								<td th:text="${model.city}"></td>
								<!--<td th:text="${model.photo}"></td>-->								
								<td th:text="${model.active}"></td>
								<td th:text="${model.lat}"></td>
								<td th:text="${model.lon}"></td>
								<td th:text="${model.userAgreement}"></td>
								<td th:text="${model.dependent}"></td>
								<td th:text="${model.ytdOop}"></td>
								
								<td class="text-center">
								<a class="edit btn btn-dark" th:href="@{'/patient/edit'(id=${model.id})}"><i class="fa fa-pencil-square-o"></i>
								Edit
								</a>								
								<a class="delete btn btn-danger" th:href="@{'/patient/delete'(id=${model.id})}">
								<i class="fa fa-times-circle"></i>
								Remove								
								</a>
								</td>
								</tr>							
						</tbody>
						</table>
					</div>
				</div>
			</div>
		</div>
		</div>
		</div>
</div>
</html>
