<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" th:include="layout::page" class='sidebar-large'>
<div class="container" th:fragment="content">					
			<div class="row">
				<div class="col-md-12">
					<div class="panel panel-default">
                                        <div class="panel-heading" th:if="${message} != null">
						<h3 class ="panel-title"><strong th:text="${message}"></strong></h3>
					</div>
					<div class="panel-heading bg-red">
						<h3 class ="panel-title"><strong th:text="#{page.heading.audit}">Audit</strong></h3>
					</div>
					<div class="panel-body">
                            <div class="row">
                                <div class="col-md-12 m-b-20">
                                    <div class="btn-group">
                                       <a id="table-edit_new" class="btn btn-danger" th:href="@{'/audit/edit'}">
                                            Add New <i class="fa fa-plus"></i>
                                        </a>
                                    </div>
                                </div>
                      <div class="col-md-12 col-sm-12 col-xs-12 table-responsive table-red">
                            <table class="table table-striped table-hover dataTable" id="table-editable">          
								<thead>
									<tr>
										<th th:text="#{audit.id}">id</th>
							<th th:text="#{audit.ip_address}">ip_address</th>
							<th th:text="#{audit.change_table}">change_table</th>
							<th th:text="#{audit.change_id}">change_id</th>
							<th th:text="#{audit.change_field}">change_field</th>
							<th th:text="#{audit.change_from}">change_from</th>
							<th th:text="#{audit.change_to}">change_to</th>
							<th th:text="#{audit.change_dt}">change_dt</th>
							<th th:text="#{audit.user}">user</th>
							
										<th class="text-center sorting" th:text="#{page.text.options}">Options</th>
									</tr>
								</thead>
						<tbody>							
								<tr th:each="model :${models}">
								<td th:text="${model.id}"></td>
								<td th:text="${model.ip_address}"></td>
								<td th:text="${model.change_table}"></td>
								<td th:text="${model.change_id}"></td>
								<td th:text="${model.change_field}"></td>
								<td th:text="${model.change_from}"></td>
								<td th:text="${model.change_to}"></td>
								<td th:text="${model.change_dt}"></td>
								<td th:text="${model.user}"></td>
								
								<td class="text-center">
								<a class="edit btn btn-dark" th:href="@{'/audit/edit'(id=${model.id})}"><i class="fa fa-pencil-square-o"></i>
								Edit
								</a>								
								<a class="delete btn btn-danger" th:href="@{'/audit/delete'(id=${model.id})}">
								<i class="fa fa-times-circle"></i>
								Remove								
								</a>
								</td>
								</tr>							
						</tbody>
						</table>
					</div>
				</div>
			</div>
		</div>
		</div>
		</div>
</div>
</html>
