<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" th:include="layout::page" class='sidebar-large'>
<div class="container" th:fragment="content">					
<div class="page-title"> <i class="icon-custom-left"></i>               
            </div>
            <div class="row">
                <div class="col-md-12">
                    <div class="panel panel-default">
                        <div class="panel-heading bg-red">
							<h3 class ="panel-title"><strong th:text="#{page.heading.audit}">Audit</strong></h3>
						</div>
                        <div class="panel-body">
                            <div class="row">
                                <div class="col-md-12 col-sm-12 col-xs-12">
                                <form action="#" th:action="@{/audit/save}" th:object="${audit}" method="post" id="audit" class="form-horizontal">
					<div class="form-group">
	                                   <ul>
		   <li th:each="e : ${#fields.detailedErrors()}" th:class="${e.global}? globalerr : fielderr">
                   <span class='text-danger' th:text="${e.global}?'*':${e.fieldName}">The field name </span> 
                   | <span class='text-danger' th:text="${e.message}">The error message</span>                   
                   </li>
                </ul>
					<div th:errors="${audit}"></div>
					</div>
                                	<input type="hidden" class="form-control" th:field="*{id}" th:value="*{id}"/>
                                                              <div class='form-group'>
                                            <label class='col-sm-3 control-label'>Ip_address<span class='asterisk'>*</span>
                                            </label>
                                            <div class='col-sm-9'>
                                              <input type="text" required=''  class='form-control' th:field="*{ipAddress}" th:value="*{ipAddress}"/>   
                                            </div>
                                        </div>
                      <div class='form-group'>
                                            <label class='col-sm-3 control-label'>Change_table<span class='asterisk'>*</span>
                                            </label>
                                            <div class='col-sm-9'>
                                              <input type="text" required=''  class='form-control' th:field="*{changeTable}" th:value="*{changeTable}"/>   
                                            </div>
                                        </div>
                      <div class='form-group'>
                                            <label class='col-sm-3 control-label'>Change_field<span class='asterisk'>*</span>
                                            </label>
                                            <div class='col-sm-9'>
                                              <input type="text" required=''  class='form-control' th:field="*{changeField}" th:value="*{changeField}"/>   
                                            </div>
                                        </div>
                      <div class='form-group'>
                                            <label class='col-sm-3 control-label'>Change_from<span class='asterisk'>*</span>
                                            </label>
                                            <div class='col-sm-9'>
                                              <input type="text" required=''  class='form-control' th:field="*{changeFrom}" th:value="*{changeFrom}"/>   
                                            </div>
                                        </div>
                      <div class='form-group'>
                                            <label class='col-sm-3 control-label'>Change_to<span class='asterisk'>*</span>
                                            </label>
                                            <div class='col-sm-9'>
                                              <input type="text" required=''  class='form-control' th:field="*{changeTo}" th:value="*{changeTo}"/>   
                                            </div>
                                        </div>
                      <div class='form-group'>
                                            <label class='col-sm-3 control-label'>Change_dt<span class='asterisk'>*</span>
                                            </label>
                                            <div class='col-sm-9'>
                                              <input type="text" required=''  class='form-control' th:field="*{changeDt}" th:value="*{changeDt}"/>   
                                            </div>
                                        </div>
                      <div class='form-group'>
                                            <label class='col-sm-3 control-label'>User<span class='asterisk'>*</span>
                                            </label>
                                            <div class='col-sm-9'>
                                              <input type="text" required=''  class='form-control' th:field="*{user}" th:value="*{user}"/>   
                                            </div>
                                        </div>

                                                                          
                                        <div class="col-sm-9 col-sm-offset-3">
                                            <div class="pull-right">
                                                <button class="btn btn-primary m-b-10" onclick="javascript:$('#audit').parsley('validate');" th:text="#{page.button.submit}">Submit</button>
                                            </div>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>			
</div>
</div>
</html>
