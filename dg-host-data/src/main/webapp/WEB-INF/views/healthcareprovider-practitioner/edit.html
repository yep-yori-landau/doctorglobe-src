<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:th="http://www.thymeleaf.org" th:include="layout::page"
	class='sidebar-large'>
<div class="container" th:fragment="content">
	<div class="page-title">
		<i class="icon-custom-left"></i>
	</div>
	<div class="row">
		<div class="col-md-12">
			<div class="panel panel-default">
				<div class="panel-heading bg-red">
					<h3 class="panel-title">
						<strong th:text="#{page.heading.healthcareprovider-practitioner}">healthcareprovider-practitioner</strong>
					</h3>
				</div>
				<div class="panel-body">
					<div class="row">
						<div class="col-md-12 col-sm-12 col-xs-12">
							<form action="#"
								th:action="@{/healthcareprovider-practitioner/save}"
								th:object="${healthcareproviderPractitioner}" method="post"
								id="healthcareprovider-practitioner" class="form-horizontal">
								<div class="form-group">
									<ul>
										<li th:each="e : ${#fields.detailedErrors()}"
											th:class="${e.global}? globalerr : fielderr"><span
											class='text-danger' th:text="${e.global}?'*':${e.fieldName}">The
												field name </span> | <span class='text-danger'
											th:text="${e.message}">The error message</span></li>
									</ul>
									<div th:errors="${healthcareproviderPractitioner}"></div>
								</div>
								<input type="hidden" class="form-control" th:field="*{id}"
									th:value="*{id}" />
								<div class='form-group'>
									<label class='col-sm-3 control-label'>Title<span
										class='asterisk'>*</span>
									</label>
									<div class='col-sm-9'>
										<input type="text" required='' class='form-control'
											th:field="*{title}"
											th:value="*{title}" />
									</div>
								</div>
								<div class='form-group'>
									<label class='col-sm-3 control-label'>First Name<span
										class='asterisk'>*</span>
									</label>
									<div class='col-sm-9'>
										<input type="text" required='' class='form-control'
											th:field="*{firstName}"
											th:value="*{firstName}" />
									</div>
								</div>		
								<div class='form-group'>
									<label class='col-sm-3 control-label'>Last Name<span
										class='asterisk'>*</span>
									</label>
									<div class='col-sm-9'>
										<input type="text" required='' class='form-control'
											th:field="*{lastName}"
											th:value="*{lastName}" />
									</div>
								</div>						
								<div class='form-group'>
									<label class='col-sm-3 control-label'>Mobile<span
										class='asterisk'>*</span>
									</label>
									<div class='col-sm-9'>
										<input type="text" class='form-control'
											th:field="*{mobile}"
											th:value="*{mobile}" />
									</div>
								</div>						
								<div class='form-group'>
									<label class='col-sm-3 control-label'>Email<span
										class='asterisk'>*</span>
									</label>
									<div class='col-sm-9'>
										<input type="text" required='' class='form-control'
											th:field="*{email}"
											th:value="*{email}" />
									</div>
								</div>		
								<div class='form-group'>
									<label class='col-sm-3 control-label'>Description<span
										class='asterisk'>*</span>
									</label>
									<div class='col-sm-9'>
										<textarea type="text" class='form-control'
											th:field="*{description}"
											th:value="*{description}"></textarea>
									</div>
								</div>		
								<div class='form-group'>
									<label class='col-sm-3 control-label'>Insurance Cap<span
										class='asterisk'>*</span>
									</label>
									<div class='col-sm-9'>
										<input type="text" required='' class='form-control'
											th:field="*{insuranceCap}"
											th:value="*{insuranceCap}" />
									</div>
								</div>
								<div class='form-group'>
									<label class='col-sm-3 control-label'>Currency<span
										class='asterisk'>*</span>
									</label>
									<div class='col-sm-9'>
										<input type="text" required='' class='form-control'
											th:field="*{currency}"
											th:value="*{currency}" />
									</div>
								</div>		
								<div class='form-group'>
									<label class='col-sm-3 control-label'>Policy File<span
										class='asterisk'>*</span>
									</label>
									<div class='col-sm-9'>
										<input type="text" class='form-control'
											th:field="*{policyFile}"
											th:value="*{policyFile}" />
									</div>
								</div>								
								<div class='form-group'>
									<label class='col-sm-3 control-label'>Healthcareprovider<span
										class='asterisk'>*</span>
									</label>
									<div class='col-sm-9'>
										<select th:field="*{healthcareprovider}" class="form-control">
											<option th:each="var : ${healthcareproviderList}"
												th:value="${var.id}" th:text="${var.name}"></option>
										</select>
									</div>
								</div>
								<div class='form-group'>
									<label class='col-sm-3 control-label'>Practitioner<span
										class='asterisk'>*</span>
									</label>
									<div class='col-sm-9'>
										<select th:field="*{practitioner}" class="form-control">
											<option th:each="var : ${practitionerList}"
												th:value="${var.id}" th:text="${var.firstName}"></option>
										</select>
									</div>
								</div>
								<div class='form-group'>
									<label class='col-sm-3 control-label'>Practitioner Type<span
										class='asterisk'>*</span>
									</label>
									<div class='col-sm-9'>
										<select th:field="*{type}" class="form-control">
											<option th:each="var : ${practitionertypeList}"
												th:value="${var.id}" th:text="${var.name}"></option>
										</select>
									</div>
								</div>

								<div class="col-sm-9 col-sm-offset-3">
									<div class="pull-right">
										<button class="btn btn-primary m-b-10"
											onclick="javascript:$('#healthcareprovider-practitioner').parsley('validate');"
											th:text="#{page.button.submit}">Submit</button>
									</div>
								</div>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
</div>
</html>
