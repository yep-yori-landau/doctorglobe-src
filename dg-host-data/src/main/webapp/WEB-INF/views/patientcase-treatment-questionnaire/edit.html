<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" th:include="layout::page" class='sidebar-large'>
<div class="container" th:fragment="content">					
<div class="page-title"> <i class="icon-custom-left"></i>               
            </div>
            <div class="row">
                <div class="col-md-12">
                    <div class="panel panel-default">
                        <div class="panel-heading bg-red">
							<h3 class ="panel-title"><strong>Patientcase-Treatment-Questionnaire</strong></h3>
						</div>
                        <div class="panel-body">
                            <div class="row">
                                <div class="col-md-12 col-sm-12 col-xs-12">
                                <form action="#" th:action="@{/patientcase-treatment-questionnaire/save}" th:object="${patientcaseTreatmentQuestionnaire}" method="post" id="patientcaseTreatmentQuestionnaire" class="form-horizontal">
                                		<input type="hidden" class="form-control" th:field="*{id}" th:value="*{id}"/>                                
                                        
										<div class='form-group'>
                                            <label class='col-sm-3 control-label'>Treatment Questionnaire<span class='asterisk'>*</span>
                                            </label>
                                            <div class='col-sm-9'>
                                              <select th:field="*{treatmentQuestionnaire}" class="form-control">
                                                <option th:each = "var : ${treatmentQuestionnaireList}" th:value="${var.id}" th:text="${var.id}"></option>
                                              </select>                                                 
                                            </div>
                                        </div>    
                                        <div class='form-group'>
                                            <label class='col-sm-3 control-label'>Patientcase<span class='asterisk'>*</span>
                                            </label>
                                            <div class='col-sm-9'>
                                              <select th:field="*{patientcase}" class="form-control">
                                                <option th:each = "var : ${patientcaseList}" th:value="${var.id}" th:text="${var.id}"></option>
                                              </select>                                                 
                                            </div>
                                        </div>    
                                        <div class='form-group'>
                                            <label class='col-sm-3 control-label'>Value<span class='asterisk'>*</span>
                                            </label>
                                            <div class='col-sm-9'>
                                              <input th:field="*{value}" class="form-control"/>                                                
                                            </div>
                                        </div>                                                                          
                                        <div class="col-sm-9 col-sm-offset-3">
                                            <div class="pull-right">
                                                <button class="btn btn-primary m-b-10" onclick="javascript:$('#patientcaseTreatmentQuestionnaire').parsley('validate');">Submit</button>                                                
                                            </div>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>			
</div>
</div>
</html>
