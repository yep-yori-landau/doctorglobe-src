<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:th="http://www.thymeleaf.org" th:include="layout::page"
	class='sidebar-large'>
<div class="container" th:fragment="content">
	<div class="page-title">
		<i class="icon-custom-left"></i>
	</div>
	<div class="row">
		<div class="col-md-12">
			<div class="panel panel-default">
				<div class="panel-heading bg-red">
					<h3 class="panel-title">
						<strong th:text="#{page.heading.acl-permissions}">Acl-permissions</strong>
					</h3>
				</div>
				<div class="panel-body">
					<div class="row">
						<div class="col-md-12 col-sm-12 col-xs-12">
							<form action="#" th:action="@{/acl-permissions/save}"
								th:object="${aclPermissions}" method="post" id="acl-permissions"
								class="form-horizontal">
								<div class="form-group">
									<ul>
										<li th:each="e : ${#fields.detailedErrors()}"
											th:class="${e.global}? globalerr : fielderr"><span
											class='text-danger' th:text="${e.global}?'*':${e.fieldName}">The
												field name </span> | <span class='text-danger'
											th:text="${e.message}">The error message</span></li>
									</ul>
									<div th:errors="${aclPermissions}"></div>
								</div>
								<input type="hidden" class="form-control" th:field="*{id}"
									th:value="*{id}" />
								<div class='form-group'>
									<label class='col-sm-3 control-label' th:text="#{acl-permissions.role}">Role<span
										class='asterisk'>*</span>
									</label>
									<div class='col-sm-9'>                                              
                                              <select th:field="*{role}" class="form-control" required ="">
                                                <option th:each = "var : ${aclRolesList}" th:value="${var.id}" th:text="${var.role}"></option>
                                              </select>                                                                                           
                                    </div>
								</div>
								<div class='form-group'>
									<label class='col-sm-3 control-label' th:text="#{acl-permissions.resource}">Resource<span
										class='asterisk'>*</span>
									</label>
									<div class='col-sm-9'>                                              
                                              <select th:field="*{resource}" class="form-control" required ="">
                                                <option th:each = "var : ${aclResourcesList}" th:value="${var.id}" th:text="${var.resource}"></option>
                                              </select>                                                
                                    </div>
								</div>
								<div class='form-group'>
									<label class='col-sm-3 control-label' th:text="#{acl-permissions.permission}">Permission<span
										class='asterisk'>*</span>
									</label>
									<div class='col-sm-9'>
                                              <select th:field="*{permission}" class="form-control" required ="">
                                              	<option th:value="allow" th:text="Allow"></option>
                                              	<option th:value="deny" th:text="Deny"></option>                                            
                                              </select>                                                                                     
                                    </div>
								</div>


								<div class="col-sm-9 col-sm-offset-3">
									<div class="pull-right">
										<button class="btn btn-primary m-b-10"
											onclick="javascript:$('#acl-permissions').parsley('validate');"
											th:text="#{page.button.submit}">Submit</button>
									</div>
								</div>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
</div>
</html>
