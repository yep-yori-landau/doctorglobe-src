<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" th:include="layout::page" class='sidebar-large'>
<div class="container" th:fragment="content">					
			<div class="row">
				<div class="col-md-12">
					<div class="panel panel-default">
                                        <div class="panel-heading" th:if="${message} != null">
						<h3 class ="panel-title"><strong th:text="${message}"></strong></h3>
					</div>
					<div class="panel-heading bg-red">
						<h3 class ="panel-title"><strong th:text="#{page.heading.healthcareprovider-specialty-treatment-method}">healthcareproviderspecialtyTreatmentMethod</strong></h3>
					</div>
					<div class="panel-body">
                            <div class="row">
                                <div class="col-md-12 m-b-20">
                                    <div class="btn-group">
                                       <a id="table-edit_new" class="btn btn-danger" th:href="@{'/healthcareprovider-specialty-treatment-method/edit'}">
                                            Add New <i class="fa fa-plus"></i>
                                        </a>
                                    </div>
                                </div>
                      <div class="col-md-12 col-sm-12 col-xs-12 table-responsive table-red">
                            <table class="table table-striped table-hover dataTable" id="table-editable">          
								<thead>
									<tr>
										<th th:text="#{healthcareprovider-specialty-treatment-method.id}">id</th>
										<th th:text="#{healthcareprovider-specialty-treatment-method.active}">active</th>
										<th th:text="#{healthcareprovider-specialty-treatment-method.treatment}">treatment</th>
										<th th:text="#{healthcareprovider-specialty-treatment-method.method}">method</th>
										<th th:text="#{healthcareprovider-specialty-treatment-method.healthcareprovider_specialty}">healthcareprovider_specialty</th>							
										<th th:text="#{healthcareprovider-specialty-treatment-method.healthcareprovider_price}">healthcareprovider_price</th>
										<th class="text-center sorting" th:text="#{page.text.options}">Options</th>
									</tr>
								</thead>
								<tbody>							
										<tr th:each="model :${models}">
										<td th:text="${model.id}"></td>
										<td th:text="${model.active}"></td>
										<td th:text="${model.treatment}"></td>
										<td th:text="${model.method}"></td>
										<td th:text="${model.healthcareproviderSpecialty}"></td>
										<td th:text="${model.healthcareproviderPrice}"></td>
										
										<td class="text-center">
										<a class="edit btn btn-dark" th:href="@{'/healthcareprovider-specialty-treatment-method/edit'(id=${model.id})}"><i class="fa fa-pencil-square-o"></i>
										Edit
										</a>								
										<a class="delete btn btn-danger" th:href="@{'/healthcareprovider-specialty-treatment-method/delete'(id=${model.id})}">
										<i class="fa fa-times-circle"></i>
										Remove								
										</a>
										</td>
										</tr>							
								</tbody>
						</table>
					</div>
				</div>
			</div>
		</div>
		</div>
		</div>
</div>
</html>
