<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/header :: header"></head>

<body>
	<div th:replace="fragments/menu :: menu"></div>	
	<div class="container">

		<div class="page-header">
			<div class="row">
				<div class="col-lg-12">
					<h1 class="text-center text-uppercase"
						th:text="#{page.heading.patientcase}">Title</h1>
				</div>
			</div>
		</div>
		
		<div class="bs-docs-section">
			<div class="row">
				<div class="col-lg-12">
					<table class="table table-hover">
						<thead>
							<tr>
								<th th:text="#{patientcase.description}">Description</th>
								<th th:text="#{patientcase.status}">Status</th>
								<th th:text="#{patientcase.treatment}">Treatment</th>																					
							</tr>
						</thead>
						<tbody>
							<tr>								
								<td th:text="${patientcase.description}">Description</td>
								<td th:text="${patientcase.status}">Status</td>
								<td th:text="${patientcase.treatmentName}">Treatment</td>	
							</tr>
						</tbody>
					</table>
				</div>				
			</div>
		</div>
	</div>
</body>
</html>
