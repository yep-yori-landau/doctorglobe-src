  <!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/header :: header"></head>
<body>
		<div class="container-fluid">
		<div class="row">	
			<div class="panel-heading">
						<h3 class ="panel-title messagebox text-center"></h3>
			</div>
			<form action="#" th:action="@{/saveconference}" th:object="${patientconference}" method="post" id="patientconferenceform" class="form-horizontal">			
			<h2 class="text-center"
						th:text="#{page.heading.setconferencedate}">Please Set Conference Date</h2>        		
						<h2 class="text-center"
						th:text="${message}">Please Set Conference Date</h2>
        		<div class="form-group">
        		    <label class='col-sm-2 control-label' for="conferenceDate">Conference_date<span class='asterisk'>*</span></label>        			
        			<div class="col-sm-10">
        			    <input type="hidden" class="form-control" th:field="*{id}" th:value="*{id}"/>
						<input type="hidden" class="form-control" th:field="*{status}" th:value="*{status}"/>			
						<input type="hidden" class="form-control" th:field="*{facilitySpecialityTreatmentMethodPractitioner}" th:value="*{facilitySpecialityTreatmentMethodPractitioner}"/>
						<input type="hidden" class="form-control" th:field="*{patientCase}" th:value="*{patientCase}"/>
        				<input type='text' required="" class='form-control date-picker' th:field="*{conferenceDt}" th:value="*{conferenceDt}"/>        						
        			</div>
        			<label class='col-sm-2'></label>
        			<div class="col-sm-10 col-sm-2">
        			    <br/>        			
						<button class="btn btn-large btn-primary" type="submit">Save</button>
					</div>        		
        			
        		</div>      		
      		</form>
		</div>
	  </div>	
<script type="text/javascript">
	 $(document).ready(function() {
		 $('.date-picker').datepicker({
				dateFormat: 'yy-mm-dd',
				changeMonth: true,
		        changeYear: true,
		        numberOfMonths: 1,
		        showButtonPanel: true,		        
		  });
		 
		 $("#patientconferenceform").submit(function(e) {
			 e.preventDefault();
			 $.ajax({			 
				  url: /*[[${application.hostbaseurl}]] + '/doctor/saveconference'*/ "http://localhost:8080/doctor/saveconference",
				  type: "POST",			
				  data:jQuery("#patientconferenceform").serialize(),
	        	  dataType:'json',
	        	  success:function (data, status) {
	        		  console.log(data);        		  
	        		  if (data !=0) {	        			         
	        			  window.parent.location.href = window.location.protocol + "//" + window.location.host + "/" + "doctor/index?id=" + data ;         	
	        	      }
	        	  }        	
			});
		 });	
		 
		 
	 });
</script>	 
</body>
</html>
