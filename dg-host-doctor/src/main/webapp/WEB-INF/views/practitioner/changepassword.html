<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" th:include="layouts/layout::page" class='sidebar-large'>
<body th:class="page-common">
	<main id="main-content" th:fragment='content'>
		<div class="wrap">                
                <div class="my-block">
                    <h3 class="fs-22 hel-med" th:text="#{page.changepassword.change_password}"></h3>
                </div>              
                <aside class="sidebar">                    
                    <div class="my-block">
                        <h3 class="my-title-md" th:text="${practitioner.title+' '+practitioner.firstName+' '+practitioner.lastName}">Doctor Lisa Mcbee</h3>
                        <p><a th:href="@{/home/profile}" th:text="#{page.changepassword.change_profile}"></a></p> 
                    </div>
                </aside>

                <!-- results -->
                <section class="results">
                    <div class="my-block">                
                        <form th:action="@{/home/changepassword}" th:object="${resetPasswordForm}" method="post" id="changepassword" class="w-70">
                        	<ul class="my-form">
		   						<li th:each="e : ${#fields.detailedErrors()}" th:class="${e.global}? globalerr : fielderr">
                   					<span class='text-danger' th:text="${e.global}?'*':${e.fieldName}">The field name </span> 
                   					| <span class='text-danger' th:text="${e.message}">The error message</span>                   
                   				</li>
                   			</ul>
                   			<div th:errors="${resetPasswordForm}"></div>
                            <ul class="my-form">
                                <li>
                                	<input type="hidden" th:field="*{id}"/>
                                	<input type="hidden" th:field="*{oldPassword}"/>                                	
                                   	<label for="newPassword" th:text="#{page.changepassword.new_password}"></label>
                                    <input type="password" th:field="*{newPassword}"/>                                                                         
                                </li>
                                <li>
                                    <label for="confirmPassword" th:text="#{page.changepassword.confirm_password}"></label>
                    				<input type="password" th:field="*{confirmPassword}" />                    				                    			
                    				<span th:if="${passworderror == 1}" th:text="#{page.changepassword.confirm_password_not_match}" class="error field-error"></span>                                 
                                </li>                                                       
                                <li class="tr">
                                    <button type="submit" class="btn btn-green btn-sm" th:text="#{page.doctor.profile.save_and_update}">Save and Update</button>
                                </li>
                            </ul>
                        </form>
                    </div>
                </section>      
                <script type="text/javascript" th:inline='javascript'>
					$(document).ready(function() {
						$.validator.addMethod("passwordChecker",function(value){
							 var re = /^(?=.*\d)(?=.*[a-z])(?=.*[A-Z])\w{6,}$/;
							 return re.test(value);  
						 });
						 $( "#changepassword" ).validate({
							 	rules: {					 		
							 		newPassword: {
							 			required: true,
							 			minlength: 6,
							 			passwordChecker : true
							 		},
							 		confirmPassword: {
							 			required: true,
							 			minlength: 6,
							 			passwordChecker : true,
							 			equalTo: "#newPassword"
							 		}
							 	},
							 	messages: {
							 		newPassword: {
							            required: "Please provide a password",
							            minlength: "Your password must be at least 6 characters long",
							            passwordChecker: "Your password must contain atleast one number, one lowercase and one uppercase letter or the underscore"
							        },
							        confirmPassword: {
							            required: "Please provide a password",
							            minlength: "Your password must be at least 6 characters long",
							            passwordChecker: "Your password must contain atleast one number, one lowercase and one uppercase letter or the underscore",
							            equalTo: "Please enter the same password as above"
							        },
							    },
							    submitHandler: function(form){
									form.submit();
								}
						});						
					});
			</script>          
            </div>
       </main>
</body>
</html>
