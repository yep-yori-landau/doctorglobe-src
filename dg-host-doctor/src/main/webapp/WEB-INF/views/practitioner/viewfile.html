<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/header :: header"></head>

<body>
	<div th:replace="fragments/menu :: menu"></div>	
	<div class="container">

		<div class="page-header">
			<div class="row">
				<div class="col-lg-12">
					<h1 class="text-center text-uppercase"
						th:text="#{page.heading.patientcasefile}">Title</h1>
				</div>
			</div>
		</div>
		
		<div class="bs-docs-section">
			<div class="row">
				<div class="col-lg-12">
					<table class="table table-hover">
						<thead>
							<tr>
								<th th:text="#{patientcasefile.filetype}">File Type</th>
								<th th:text="#{patientcasefile.filename}">Name</th>
								<th th:text="#{patientcasefile.file}">File</th>								
							</tr>
						</thead>
						<tbody>
							<tr th:each="pcf : ${patientcasefile}">								
								<td th:text="${pcf.fileType}"></td>
								<th th:text="${pcf.fileName}">Name</th>
								<th><a th:text="#{patientcase.downloadfile}"
									class="btn btn-primary"
									th:href="@{'/download'(filename=${pcf.fileName})}">
										Download File </a></th>
							</tr>
						</tbody>
					</table>
				</div>				
			</div>
		</div>
	</div>
</body>
</html>
