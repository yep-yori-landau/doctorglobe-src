<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:th="http://www.thymeleaf.org"
	th:include="layouts/layoutcontext::page" class='sidebar-large'>
<body>
<div th:fragment='content' >
	<div class="overlay o-sm js-conference-overlay scheduleheight height550">
        <div class="overlay-header bg">
            <h3 th:if="${schedule == 1}" th:text="#{page.schedule.heading.schedule_procedure}"></h3>
            <h3 th:if="${schedule == 0}" th:text="#{page.schedule.heading.reschedule_procedure}"></h3>
            <button class="ico ico-close btn btn-blue fancyclose"></button>
        </div>
        <div class="overlay-content" th:if="${!procedureFound}">
          <h3 th:if="${message != null}" th:text="#{page.book.success}"></h3>
          <h3>
          	<span th:if="${message == null and schedule == 1}" th:text="#{page.schedule_procedure.subheading}"></span>
          	<span th:if="${message == null and schedule == 0}" th:text="#{page.reschedule_procedure.subheading}"></span>
          	<span th:text="${patientname}"></span>
          </h3>
          <form class="form-block" name="patientBookingForm" method='post' th:object="${patientBookingForm}" th:action="@{/home/booking/edit}">
            <ul class="row single-col">
              <li>              
                <input type ="hidden" name="id" id="id" th:field="*{id}"/>             
                <input type ="hidden" name="receiver" id="receiver" th:field="*{receiver}"/>
                <input type ="hidden" name="status" id="status" th:field="*{status}"/>
                <input type ="hidden" name="subject" id="subject" th:field="*{subject}"/>
                <input type ="hidden" name="healthcareproviderSpecialtyTreatmentMethodPractitioner" id="healthcareproviderSpecialtyTreatmentMethodPractitioner" required="" th:field="*{healthcareproviderSpecialtyTreatmentMethodPractitioner}"/>
                <input type="hidden" name="patientcase" id="patientcase" th:field="*{patientcase}"/>
                <input type="hidden" name="timezone" id="timezone" th:field="*{timezone}"/>                
                <input type="text" name="bookingDt" id="bookingDt" required="required" th:field="*{bookingDt}" class="datepicker readonly" />
                <div class="fr width51" th:if="${message == null and schedule == 0}">
                <p class="pb-20"><strong th:text="${bookingDate}"></strong></p>
                
                 <div class="my-block-content">
                            <ul class="my-list">
                                <li>                                	
                                   	<p th:if="${patientTimeZone != practitionerTimeZone}">
                                    	<span th:text="${bookingTime}">7:00</span>
                                    	&nbsp;<span th:text="#{page.conference.yourtime}"></span>
                                    </p>
                                    <p th:if="${bookingDate != patientBookingDate}">
                                    	<span th:text="${patientBookingDate}"></span>&nbsp;<span th:text="#{page.conference.patientdate}"></span>
                                    </p>
                                    <p th:if="${patientTimeZone != practitionerTimeZone}">                                    	
                                    	<span  th:text="${patientBookingTime}">7:00</span>
                                    	&nbsp;<span th:text="#{page.conference.patienttime}"></span>
                                    </p>
                                    <p th:if="${patientTimeZone == practitionerTimeZone}">
                                    	<span th:text="${bookingTime}">7:00</span>                                    	                                    	
                                    </p>
                                    <p><span th:text="#{page.conference.scheduled_procedure_with}"></span>&nbsp;<span th:text="${patientname}"></span></p>
                                </li>                               
                            </ul>
                        </div>
                 </div>                
              </li>
              <li>             	  
	             <label for="timezone" th:text="#{page.schedule.time}">Time:</label>&nbsp;<span th:text="${practitionerTimeZone}">(Your time zone):</span><span>:&nbsp;</span>
	             <input type="text" name="time" id="time" required="required" th:field="*{time}" class="timepicker readonly time-width-100"/>
	             <div class="fr width51">
	             	<span th:text="#{page.conference.patient_timezone}">Patient time zone:</span>&nbsp;<span th:text="${patientTimeZone}"></span>
	             </div>	                            
              </li>             
              <li>
                <label for="msg" th:text="#{page.schedule.message}">Message:</label>
                <textarea rows="3" name="body" id="body" required="required" th:field="*{body}"></textarea>
              </li>
            </ul>
            <p class="tr">
              <button type="submit" class="btn btn-green btn-sm" th:text="#{page.schedule.btn.send_request}">Send Request</button>
            </p>
          </form>   
           <script type="text/javascript" th:inline='javascript'>
		$(document).ready(function() {
			/*[+
			var msg = [[${message}]];			
			var timezone = [[${timezone}]];
			+]*/			
			if(msg == 1){
				parent.jQuery.fancybox.close();											
			}
			if(timezone != null){
				$('#timezone').val(timezone);
			}
		});
   </script>		       
        </div>    
        <div class="overlay-content" th:if="${procedureFound}">
        	<h3 th:text="#{page.procedurefound.message}"></h3>
        </div>
      </div>
   </div>
  </body>  
</html>
